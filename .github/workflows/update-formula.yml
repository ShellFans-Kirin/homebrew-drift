name: Update Formula on drift_ai release

on:
  repository_dispatch:
    types: [drift-released]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.1) — used when re-triggered manually"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve payload
        id: payload
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            version='${{ github.event.client_payload.version }}'
            linux_x86='${{ github.event.client_payload.sha256.x86_64-unknown-linux-gnu }}'
            linux_arm='${{ github.event.client_payload.sha256.aarch64-unknown-linux-gnu }}'
            macos_x86='${{ github.event.client_payload.sha256.x86_64-apple-darwin }}'
            macos_arm='${{ github.event.client_payload.sha256.aarch64-apple-darwin }}'
          else
            version='${{ inputs.version }}'
            # Fetch sha256s from the release's .sha256 sidecar files
            fetch_sha() {
              local target="$1"
              curl -sSfL "https://github.com/ShellFans-Kirin/drift_ai/releases/download/${version}/drift-${version}-${target}.tar.gz.sha256" \
                | awk '{print $1}' || echo ""
            }
            linux_x86=$(fetch_sha x86_64-unknown-linux-gnu)
            linux_arm=$(fetch_sha aarch64-unknown-linux-gnu)
            macos_x86=$(fetch_sha x86_64-apple-darwin)
            macos_arm=$(fetch_sha aarch64-apple-darwin)
          fi

          # Strip leading v from version for Formula `version` field
          v_stripped="${version#v}"

          {
            echo "version=${version}"
            echo "v_stripped=${v_stripped}"
            echo "linux_x86=${linux_x86}"
            echo "linux_arm=${linux_arm}"
            echo "macos_x86=${macos_x86}"
            echo "macos_arm=${macos_arm}"
          } >> "$GITHUB_OUTPUT"

      - name: Render Formula/drift.rb
        run: |
          set -euo pipefail
          mkdir -p Formula
          cat > Formula/drift.rb <<EOF
          class Drift < Formula
            desc "Local-first CLI that captures, compacts, and binds AI coding sessions to git"
            homepage "https://github.com/ShellFans-Kirin/drift_ai"
            version "${{ steps.payload.outputs.v_stripped }}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ShellFans-Kirin/drift_ai/releases/download/${{ steps.payload.outputs.version }}/drift-${{ steps.payload.outputs.version }}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.payload.outputs.macos_arm }}"
              else
                url "https://github.com/ShellFans-Kirin/drift_ai/releases/download/${{ steps.payload.outputs.version }}/drift-${{ steps.payload.outputs.version }}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.payload.outputs.macos_x86 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ShellFans-Kirin/drift_ai/releases/download/${{ steps.payload.outputs.version }}/drift-${{ steps.payload.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.payload.outputs.linux_arm }}"
              else
                url "https://github.com/ShellFans-Kirin/drift_ai/releases/download/${{ steps.payload.outputs.version }}/drift-${{ steps.payload.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.payload.outputs.linux_x86 }}"
              end
            end

            def install
              bin.install "drift"
              doc.install "README.md", "CHANGELOG.md"
              # LICENSE is installed automatically by Homebrew
            end

            test do
              assert_match "drift", shell_output("#{bin}/drift --version")
            end
          end
          EOF

          echo "--- rendered Formula/drift.rb ---"
          cat Formula/drift.rb

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/drift.rb
          if git diff --cached --quiet; then
            echo "No staged changes to Formula — skipping commit."
            exit 0
          fi
          git commit -m "drift ${{ steps.payload.outputs.version }}

          Formula regenerated from drift_ai release dispatch."
          git push origin HEAD:main
